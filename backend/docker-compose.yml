services:
  db:
    image: postgres:18
    container_name: my_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: myappdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d myappdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: my_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://admin:postgres@/myappdb?host=/cloudsql/maccproject-7f15c:europe-west1:postgres-maccproject
      FIREBASE_CREDENTIALS_PATH: /app/secrets/maccproject-7f15c-firebase-adminsdk-fbsvc-e89d93806d.json
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/secrets:/app/secrets

volumes:
  postgres_data:
